---
- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ server_user_home }}/.local/bin"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"

- name: Get latest anki-ai release info
  ansible.builtin.uri:
    url: https://api.github.com/repos/teichholz/anki-ai/releases/latest
    return_content: true
  register: anki_release_info

- name: Get current anki-ai version
  ansible.builtin.command:
    cmd: "{{ anki_bin }} --version"
  register: anki_current_version
  failed_when: false
  changed_when: false

- name: Install anki-ai binary
  ansible.builtin.get_url:
    url: https://github.com/teichholz/anki-ai/releases/latest/download/anki-ai
    dest: "{{ anki_bin }}"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  when: >
    anki_current_version.rc != 0 or
    anki_release_info.json.tag_name | regex_replace('^v', '') not in anki_current_version.stdout

- name: Deploy anki-prune.sh
  ansible.builtin.template:
    src: anki-prune.sh.j2
    dest: /usr/local/bin/anki-prune.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy anki-snapshot.service
  ansible.builtin.template:
    src: anki-snapshot.service.j2
    dest: /etc/systemd/system/anki-snapshot.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart anki-snapshot timer

- name: Deploy anki-snapshot.timer
  ansible.builtin.copy:
    src: anki-snapshot.timer
    dest: /etc/systemd/system/anki-snapshot.timer
    owner: root
    group: root
    mode: "0644"
  notify: Restart anki-snapshot timer

- name: Enable and start anki-snapshot.timer
  ansible.builtin.systemd:
    name: anki-snapshot.timer
    enabled: true
    state: started
    daemon_reload: true
