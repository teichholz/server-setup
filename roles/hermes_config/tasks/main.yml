---
- name: Ensure ~/.hermes exists
  ansible.builtin.file:
    path: "{{ hermes_home }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"

- name: Ensure ~/.hermes/memories exists
  ansible.builtin.file:
    path: "{{ hermes_home }}/memories"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"

- name: Deploy SOUL.md
  ansible.builtin.copy:
    src: SOUL.md
    dest: "{{ hermes_home }}/SOUL.md"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0644"

- name: Deploy MEMORY.md
  ansible.builtin.template:
    src: MEMORY.md.j2
    dest: "{{ hermes_home }}/memories/MEMORY.md"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0644"
