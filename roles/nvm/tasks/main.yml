---
- name: Install nvm prerequisites
  ansible.builtin.package:
    name:
      - curl
      - git
      - build-essential
    state: present

- name: Check if nvm is already installed
  ansible.builtin.stat:
    path: "{{ nvm_dir }}/nvm.sh"
  register: _nvm_script

- name: Install nvm {{ nvm_version }}
  ansible.builtin.shell:
    cmd: >
      curl -fsSL
      https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh
      | bash
    executable: /bin/bash
  environment:
    NVM_DIR: "{{ nvm_dir }}"
    HOME: "{{ nvm_home }}"
  become: true
  become_user: "{{ nvm_user }}"
  when: not _nvm_script.stat.exists
  changed_when: true

- name: Install Node.js {{ nvm_node_version }}
  ansible.builtin.shell:
    cmd: |
      export NVM_DIR="{{ nvm_dir }}"
      . "$NVM_DIR/nvm.sh"
      nvm install {{ nvm_node_version }}
      nvm alias default {{ nvm_node_version }}
    executable: /bin/bash
  become: true
  become_user: "{{ nvm_user }}"
  environment:
    HOME: "{{ nvm_home }}"
  register: _nvm_node_install
  # nvm prints "already installed" when the version is present
  changed_when: "'is already installed' not in _nvm_node_install.stdout"

- name: Install global npm packages
  ansible.builtin.shell:
    cmd: |
      export NVM_DIR="{{ nvm_dir }}"
      . "$NVM_DIR/nvm.sh"
      if npm list -g --depth=0 "{{ item }}" 2>/dev/null | grep -q "{{ item }}"; then
        echo 'already_installed'
      else
        npm install -g "{{ item }}"
        echo 'installed'
      fi
    executable: /bin/bash
  become: true
  become_user: "{{ nvm_user }}"
  environment:
    HOME: "{{ nvm_home }}"
  loop: "{{ nvm_npm_global_packages }}"
  register: _npm_install
  changed_when: "'installed' == _npm_install.stdout | trim"
