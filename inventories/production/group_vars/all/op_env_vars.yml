---
# Map of env var name → 1Password secret reference (op://)
# Add entries here; run `just env-vars` to push them to the server.
op_env_map:
  ANKI_EMAIL: "op://Personal/ankiweb.net/username"
  ANKI_PASSWORD: "op://Personal/ankiweb.net/password"
  OBSIDIAN_EMAIL: "op://Personal/obsidian.md/username"
  OBSIDIAN_PASSWORD: "op://Personal/obsidian.md/password"

# Path on the remote host where env vars are written
op_env_file: /etc/environment
