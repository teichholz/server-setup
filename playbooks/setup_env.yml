---
# Reads secret refs from op_env_map (group_vars) and writes them to the server.
#
# Prerequisites:
#   - op CLI installed and signed in
#
# Usage:
#   just env-vars
#
# Dry-run (show what would be written without touching the server):
#   just env-vars-check

- name: Push env vars from 1Password to server
  hosts: teichserver
  become: true
  gather_facts: false

  tasks:
    - name: Resolve each secret reference
      delegate_to: localhost
      become: false
      ansible.builtin.command: op read "{{ item.value }}"
      register: _op_results
      loop: "{{ op_env_map | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true
      changed_when: false

    - name: Build env var dict
      ansible.builtin.set_fact:
        _env_vars: "{{ _env_vars | default({}) | combine({item.item.key: item.stdout}) }}"
      loop: "{{ _op_results.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      no_log: true

    - name: Ensure env file exists
      ansible.builtin.file:
        path: "{{ op_env_file }}"
        state: touch
        mode: "0640"
        owner: root
        group: root
        modification_time: preserve
        access_time: preserve

    - name: Write env vars to {{ op_env_file }}
      ansible.builtin.lineinfile:
        path: "{{ op_env_file }}"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        owner: root
        group: root
        mode: "0640"
      loop: "{{ _env_vars | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true

    - name: Report summary
      ansible.builtin.debug:
        msg: "Wrote {{ _env_vars | length }} env var(s) to {{ op_env_file }} on {{ inventory_hostname }}"
