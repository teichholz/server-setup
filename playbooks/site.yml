---
- name: Configure teichserver
  hosts: teichserver
  become: true

  pre_tasks:
    - name: Install common CLI tools
      ansible.builtin.apt:
        name:
          - fd-find
          - ripgrep
        state: present
        update_cache: true

  roles:
    - role: nvm
      vars:
        nvm_npm_global_packages:
          - "@mermaid-js/mermaid-cli"
    - anki_snapshot
    - obsidian_sync
    - hermes_config
